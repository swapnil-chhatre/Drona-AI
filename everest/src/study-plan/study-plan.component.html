<div class="plan-shell">
  <app-sidebar />
  <main class="plan-main">
    <header class="plan-topbar">
      <div class="plan-topbar__brand">Drona-AI</div>
      <div class="plan-topbar__meta">
        <span class="plan-topbar__step">Step 3: Study Plan</span>
        @if (isStreaming()) {
          <span class="plan-topbar__status">
            <span class="material-symbols-outlined rotating" aria-hidden="true"
              >sync</span
            >
            Generating...
          </span>
        }
        @if (isDone()) {
          <span class="plan-topbar__status plan-topbar__status--done">
            <span class="material-symbols-outlined" aria-hidden="true"
              >check_circle</span
            >
            Complete
          </span>
        }
      </div>
    </header>

    <div class="plan-content">
      <h1 class="plan-title">{{ planTitle }}</h1>

      @if (!markdown() && isStreaming()) {
        <div class="plan-loading">
          <span class="material-symbols-outlined rotating">auto_awesome</span>
          <p>Building your study plan...</p>
        </div>
      }

      @if (markdown()) {
        <div class="plan-output markdown-body" [innerHTML]="renderedHtml"></div>
      }
    </div>
  </main>
</div>
