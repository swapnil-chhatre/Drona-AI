      <span class="label">Developers:</span>
      @for (dev of developers; track dev.name; let last = $last) {
        <a
          [href]="dev.url"
          target="_blank"
          rel="noopener noreferrer"
          class="developer-link"
        >
          {{ dev.name }}
        </a>
        @if (!last) {
          <span class="separator">•</span>
        }
      }

    <div class="heart-line">
